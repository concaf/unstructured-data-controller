apiVersion: operator.dataverse.redhat.com/v1alpha1
kind: DocumentProcessor
metadata:
  labels:
    app.kubernetes.io/name: unstructured-data-controller
    app.kubernetes.io/managed-by: kustomize
  name: documentprocessor-sample
spec:
  stageName: convert
  dependsOn:
    - name: crawl
      type: SourceCrawler
  config:
    type: docling
    doclingConfig:
      from_formats: [pdf, docx, pptx, xlsx]
      do_ocr: true
      ocr_engine: easyocr
      ocr_lang: [en]
      pdf_backend: dlparse_v4
      table_mode: fast
