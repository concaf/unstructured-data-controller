# Operator-level secret for filestore S3, docling, and embedding model credentials
apiVersion: v1
kind: Secret
metadata:
  name: operator-secret
type: Opaque
stringData:
  DOCLING_USER_KEY: ""
  FILE_STORE_AWS_REGION: us-east-1
  FILE_STORE_AWS_ACCESS_KEY_ID: test
  FILE_STORE_AWS_SECRET_ACCESS_KEY: test
  FILE_STORE_AWS_ENDPOINT: http://localhost:4566
  EMBEDDING_ENDPOINT: "http://localhost:11434/v1/embeddings"
  EMBEDDING_API_KEY: ""
---
# Pipeline-level secret for source and destination AWS credentials
apiVersion: v1
kind: Secret
metadata:
  name: pipeline-secret
type: Opaque
stringData:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_ENDPOINT: http://localhost:4566
