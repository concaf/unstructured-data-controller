apiVersion: operator.dataverse.redhat.com/v1alpha1
kind: UnstructuredDataPipeline
metadata:
  labels:
    app.kubernetes.io/name: unstructured-data-controller
    app.kubernetes.io/managed-by: kustomize
  name: my-pipeline
spec:
  secretRef: pipeline-secret
  stages:
    - name: crawl
      type: SourceCrawler
      sourceCrawlerConfig:
        type: s3
        s3Config:
          bucket: data-ingestion-bucket
          prefix: documents/
    - name: convert
      type: DocumentProcessor
      dependsOn:
        - name: crawl
      documentProcessorConfig:
        type: docling
        doclingConfig:
          from_formats: [pdf, docx, html]
          do_ocr: true
          ocr_engine: easyocr
    - name: chunk
      type: ChunksGenerator
      dependsOn:
        - name: convert
      chunksGeneratorConfig:
        strategy: recursiveCharacterTextSplitter
        recursiveCharacterSplitterConfig:
          chunkSize: 1000
          chunkOverlap: 200
    - name: embed
      type: VectorEmbeddingsGenerator
      dependsOn:
        - name: chunk
      vectorEmbeddingsGeneratorConfig:
        modelName: nomic-ai/nomic-embed-text-v1.5
    - name: sync
      type: DestinationSyncer
      dependsOn:
        - name: embed
      destinationSyncerConfig:
        type: s3
        s3DestinationConfig:
          bucket: output-bucket
          prefix: processed/
