apiVersion: apps/v1
kind: Deployment
metadata:
  name: unstructured-data-mcp-server
  labels:
    app: unstructured-data-mcp-server
    component: unstructured-data-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unstructured-data-mcp-server
  template:
    metadata:
      labels:
        app: unstructured-data-mcp-server
    spec:
      serviceAccountName: unstructured-data-mcp-server
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: unstructured-data-mcp-server
        image: unstructured-data-mcp-server:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        envFrom:
        - configMapRef:
            name: unstructured-data-mcp-server-config
        - secretRef:
            name: unstructured-data-mcp-server-secret

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"

      restartPolicy: Always
