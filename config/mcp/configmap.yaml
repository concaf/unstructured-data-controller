apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  labels:
    app: mcp-server
data:
  # TODO: Replace YOUR_REALM with your actual Red Hat SSO realm
  SSO_AUTHORIZATION_URL: "<SSO_AUTHORIZATION_URL>"
  SSO_TOKEN_URL: "<SSO_TOKEN_URL>"
  SSO_INTROSPECTION_URL: "<SSO_INTROSPECTION_URL>"
  # TODO: Update with actual route host after deployment
  SSO_CALLBACK_URL: "<SSO_CALLBACK_URL>"
  MCP_SERVER_PORT: "8080"
  # TODO: Replace with your Snowflake account identifier (e.g., xy12345.us-east-1)
  SNOWFLAKE_ACCOUNT: "<YOUR_SNOWFLAKE_ACCOUNT>"
