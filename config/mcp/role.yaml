apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unstructured-data-mcp-server-role
  labels:
    app: unstructured-data-mcp-server
rules:
# Allow listing and getting UnstructuredDataPipeline CRs
- apiGroups:
  - operator.dataverse.redhat.com
  resources:
  - unstructureddatapipelines
  verbs:
  - get
  - list
  - watch
